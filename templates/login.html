<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ branding.company_name }} — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3a; --accent:#7c5cfc; --text:#e8eaf0; --text-muted:#888ba0; --error:#ef4444; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);
      min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1.5rem; }
    .logo { display:flex; align-items:center; gap:0.5rem; text-decoration:none; color:var(--text); margin-bottom:2rem; }
    .logo-icon { font-size:2rem; }
    .logo-text { font-size:1.6rem; font-weight:800; }
    .logo-text span { color:var(--accent); }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2.5rem; width:100%; max-width:400px; }
    h2 { font-size:1.3rem; font-weight:700; margin-bottom:0.3rem; }
    .sub { color:var(--text-muted); font-size:0.85rem; margin-bottom:1.8rem; }
    .form-group { margin-bottom:1rem; }
    label { display:block; font-size:0.82rem; font-weight:500; color:var(--text-muted); margin-bottom:0.4rem; }
    input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px;
      padding:0.65rem 0.9rem; color:var(--text); font-size:0.9rem; outline:none; font-family:inherit; }
    input:focus { border-color:var(--accent); }
    .btn { width:100%; background:var(--accent); color:#fff; border:none; border-radius:8px;
      padding:0.75rem; font-size:0.95rem; font-weight:600; cursor:pointer; margin-top:0.5rem; font-family:inherit; }
    .btn:hover { opacity:0.9; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .error { color:var(--error); font-size:0.82rem; margin-top:0.75rem; display:none; }
    .error.visible { display:block; }
    .divider { text-align:center; margin:1.5rem 0 1rem; font-size:0.82rem; color:var(--text-muted); }
    .btn-secondary { width:100%; background:transparent; color:var(--text-muted); border:1px solid var(--border);
      border-radius:8px; padding:0.65rem; font-size:0.88rem; cursor:pointer; font-family:inherit; }
    .btn-secondary:hover { border-color:var(--accent); color:var(--text); }
    .back { display:block; text-align:center; margin-top:1.5rem; color:var(--text-muted); font-size:0.82rem; text-decoration:none; }
    .back:hover { color:var(--text); }
  </style>
  {{ branding_style | safe }}
</head>
<body>

<a href="/" class="logo">
  <div class="logo-icon">{{ branding.logo_emoji }}</div>
  <span class="logo-text">{{ branding.company_name }}</span>
</a>

<div class="card">
  <h2>Sign In</h2>
  <p class="sub">Access your account</p>

  <div class="form-group">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
  </div>

  <div class="error" id="error-msg">Incorrect email or password. Please try again.</div>
  <button class="btn" id="btn-login">Sign In</button>

  <div class="divider">Don't have an account?</div>
  <button class="btn-secondary" onclick="location.href='/portal'">Create a Customer Account</button>
</div>

<a href="/" class="back">← Back to quote builder</a>

<script>
async function tryLogin() {
  const btn   = document.getElementById('btn-login');
  const errEl = document.getElementById('error-msg');
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('password').value;

  errEl.classList.remove('visible');
  if (!email || !pw) { errEl.textContent = 'Please enter your email and password.'; errEl.classList.add('visible'); return; }

  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Login failed');

    if (d.role === 'admin') {
      sessionStorage.setItem('ndj_auth', '1');
      location.href = '/admin';
    } else if (d.role === 'staff') {
      localStorage.setItem('ndj_staff_token', d.token);
      localStorage.setItem('ndj_staff_user', JSON.stringify({ name: d.name, email: d.email }));
      location.href = '/staff-portal';
    } else {
      localStorage.setItem('ndj_customer_token', d.token);
      localStorage.setItem('ndj_customer_user', JSON.stringify({ name: d.name, email: d.email }));
      location.href = '/portal';
    }
  } catch(e) {
    errEl.textContent = e.message || 'Incorrect email or password.';
    errEl.classList.add('visible');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

document.getElementById('btn-login').addEventListener('click', tryLogin);
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
</script>
</body>
</html>
