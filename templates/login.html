<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ branding.company_name }} — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  {{ branding_style | safe }}
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: var(--bg-base);
    }
    .logo {
      display: flex; align-items: center; gap: 0.6rem;
      text-decoration: none; color: var(--text-primary);
      margin-bottom: 2rem;
    }
    .logo-text { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-hover);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      width: 100%; max-width: 400px;
      box-shadow: var(--shadow-card);
    }
    h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.3rem; }
    .sub { color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 1.8rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-size: 0.82rem; font-weight: 500;
      color: var(--text-secondary); margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%; background: var(--bg-input);
      border: 1px solid var(--border-hover);
      border-radius: var(--radius-sm);
      padding: 0.65rem 0.9rem;
      color: var(--text-primary); font-size: 0.9rem;
      outline: none; font-family: inherit;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .btn {
      width: 100%; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm);
      padding: 0.75rem; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; margin-top: 0.5rem; font-family: inherit;
      transition: opacity var(--transition);
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      color: var(--danger); font-size: 0.82rem;
      margin-top: 0.75rem; display: none;
      background: rgba(239,68,68,0.08); border-radius: var(--radius-sm);
      padding: 0.5rem 0.75rem;
    }
    .error.visible { display: block; }
    .divider {
      text-align: center; margin: 1.5rem 0 1rem;
      font-size: 0.82rem; color: var(--text-muted);
      position: relative;
    }
    .divider::before {
      content: '';
      position: absolute; top: 50%; left: 0; right: 0;
      height: 1px; background: var(--border-hover);
    }
    .divider span {
      position: relative; background: var(--bg-card);
      padding: 0 0.75rem;
    }
    .btn-secondary {
      width: 100%; background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-hover);
      border-radius: var(--radius-sm);
      padding: 0.65rem; font-size: 0.875rem;
      cursor: pointer; font-family: inherit;
      transition: border-color var(--transition), color var(--transition);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--text-primary); }
    .back {
      display: block; text-align: center; margin-top: 1.5rem;
      color: var(--text-muted); font-size: 0.82rem; text-decoration: none;
      transition: color var(--transition);
    }
    .back:hover { color: var(--text-secondary); }


  </style>
</head>
<body>

<a href="/" class="logo">
  {% if branding.logo_image %}<div class="logo-icon logo-icon--img"><img src="{{ branding.logo_image }}" class="brand-logo-img" alt="{{ branding.company_name }}" /></div>{% else %}<div class="logo-icon">{{ branding.logo_emoji }}</div>{% endif %}
  <span class="logo-text">{{ branding.company_name }}</span>
</a>

<div class="card">
  <h2>Sign In</h2>
  <p class="sub">Access your account</p>

  <div class="form-group">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
  </div>

  <div class="error" id="error-msg">Incorrect email or password. Please try again.</div>
  <button class="btn" id="btn-login">Sign In</button>

  <div class="divider"><span>Don't have an account?</span></div>
  <button class="btn-secondary" onclick="location.href='/portal'">Create a Customer Account</button>
</div>

<a href="/" class="back">← Back to quote builder</a>

<script>
async function tryLogin() {
  const btn   = document.getElementById('btn-login');
  const errEl = document.getElementById('error-msg');
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('password').value;

  errEl.classList.remove('visible');
  if (!email || !pw) { errEl.textContent = 'Please enter your email and password.'; errEl.classList.add('visible'); return; }

  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Login failed');

    // If tenant has a custom domain, redirect there; otherwise use /{slug} path
    function tenantUrl(path) {
      if (d.custom_domain) return 'https://' + d.custom_domain + path;
      return (d.slug ? '/' + d.slug : '') + path;
    }
    if (d.role === 'super_admin') {
      localStorage.setItem('ndj_super_token', d.token);
      location.href = '/admin';
    } else if (d.role === 'tenant_admin') {
      localStorage.setItem('ndj_admin_token', d.token);
      location.href = tenantUrl('/admin');
    } else if (d.role === 'staff') {
      localStorage.setItem('ndj_staff_token', d.token);
      localStorage.setItem('ndj_staff_user', JSON.stringify({ name: d.name, email: d.email }));
      location.href = tenantUrl('/staff-portal');
    } else {
      localStorage.setItem('ndj_customer_token', d.token);
      localStorage.setItem('ndj_customer_user', JSON.stringify({ name: d.name, email: d.email }));
      location.href = tenantUrl('/portal');
    }
  } catch(e) {
    errEl.textContent = e.message || 'Incorrect email or password.';
    errEl.classList.add('visible');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

document.getElementById('btn-login').addEventListener('click', tryLogin);
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
</script>
</body>
</html>
