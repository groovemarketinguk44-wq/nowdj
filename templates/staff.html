<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NowDJ — Staff Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a; --accent: #7c5cfc;
      --text: #e8eaf0; --text-muted: #888ba0; --success: #22c55e; --error: #ef4444;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem;
      border-bottom: 1px solid var(--border); background: var(--surface); }
    .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--text); }
    .logo-icon { font-size: 1.4rem; }
    .logo-text { font-size: 1.2rem; font-weight: 800; }
    .logo-text span { color: var(--accent); }
    #btn-logout { background: none; border: 1px solid var(--border); color: var(--text-muted);
      padding: 0.4rem 0.9rem; border-radius: 6px; cursor: pointer; font-size: 0.82rem; display: none; }
    #btn-logout:hover { border-color: var(--accent); color: var(--text); }
    .staff-label { font-size: 0.8rem; color: var(--text-muted); display: none; }

    .page { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Auth */
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 2.5rem; max-width: 400px; margin: 3rem auto; }
    .auth-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.3rem; }
    .auth-sub { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.8rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 500; margin-bottom: 0.4rem; color: var(--text-muted); }
    .form-group input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.65rem 0.9rem; color: var(--text); font-size: 0.9rem; outline: none; }
    .form-group input:focus { border-color: var(--accent); }
    .btn-primary { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 8px;
      padding: 0.75rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-error { color: var(--error); font-size: 0.82rem; margin-top: 0.6rem; display: none; }
    .auth-error.visible { display: block; }

    /* Dashboard */
    #dashboard { display: none; }
    .dash-header { margin-bottom: 2rem; }
    .dash-header h1 { font-size: 1.5rem; font-weight: 700; }
    .dash-header p { color: var(--text-muted); font-size: 0.88rem; margin-top: 0.25rem; }

    .section-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 0.75rem; }

    /* Booking cards */
    .booking-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.2rem 1.4rem; margin-bottom: 0.75rem; display: flex; gap: 1.2rem; align-items: flex-start; }
    .booking-date-box { background: var(--accent-dim, rgba(124,92,252,0.12)); border-radius: 10px;
      padding: 0.6rem 0.8rem; text-align: center; min-width: 56px; flex-shrink: 0; }
    .date-day   { font-size: 1.5rem; font-weight: 800; color: var(--accent); line-height: 1; }
    .date-month { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-top: 0.1rem; }
    .booking-info { flex: 1; min-width: 0; }
    .booking-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.3rem; }
    .booking-meta { color: var(--text-muted); font-size: 0.82rem; display: flex; flex-wrap: wrap; gap: 0.75rem; }
    .booking-meta span { display: flex; align-items: center; gap: 0.3rem; }
    .status-badge { font-size: 0.7rem; font-weight: 600; padding: 0.18rem 0.55rem; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.04em; }
    .status-confirmed { background: rgba(34,197,94,0.15); color: var(--success); }
    .status-completed { background: rgba(124,92,252,0.15); color: var(--accent); }
    .status-cancelled { background: rgba(239,68,68,0.15); color: var(--error); }
    .booking-notes { margin-top: 0.5rem; font-size: 0.82rem; color: var(--text-muted);
      background: rgba(255,255,255,0.04); border-radius: 6px; padding: 0.4rem 0.6rem; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .empty-state strong { color: var(--text); }
    .empty-state p { margin-top: 0.4rem; font-size: 0.85rem; }
    .loading { text-align: center; padding: 2rem; color: var(--text-muted); }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">
    <div class="logo-icon">🎧</div>
    <span class="logo-text">Now<span>DJ</span> Staff</span>
  </a>
  <div style="display:flex;align-items:center;gap:1rem">
    <span class="staff-label" id="staff-label"></span>
    <button id="btn-logout">Sign out</button>
  </div>
</header>

<div class="page">

  <!-- Login -->
  <div id="auth-section">
    <div class="auth-card">
      <div class="auth-title">Staff Login</div>
      <div class="auth-sub">Sign in to view your schedule</div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@nowdj.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div class="auth-error" id="login-error"></div>
      <button class="btn-primary" id="btn-login">Sign In</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <div class="dash-header">
      <h1 id="staff-name-heading">My Schedule</h1>
      <p>Your upcoming and recent bookings</p>
    </div>

    <div class="loading" id="bookings-loading">Loading your schedule…</div>
    <div id="upcoming-section" style="display:none">
      <div class="section-title">Upcoming</div>
      <div id="upcoming-list"></div>
    </div>
    <hr class="divider" id="divider" style="display:none" />
    <div id="past-section" style="display:none">
      <div class="section-title">Past</div>
      <div id="past-list"></div>
    </div>
    <div class="empty-state" id="empty-state" style="display:none">
      <strong>No bookings assigned yet</strong>
      <p>Check back soon — your schedule will appear here once bookings are assigned.</p>
    </div>

    <hr class="divider" style="margin-top:2rem" />
    <div id="profile-section" style="display:none">
      <div class="section-title" style="margin-bottom:0.75rem">Account Settings</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;max-width:420px">
        <div class="form-group"><label>Full Name</label><input type="text" id="prof-name" /></div>
        <div class="form-group"><label>Email</label><input type="email" id="prof-email" /></div>
        <div class="form-group"><label>New Password <span style="color:var(--text-muted);font-size:0.8rem">(leave blank to keep current)</span></label><input type="password" id="prof-pw" placeholder="••••••••" /></div>
        <div class="auth-error" id="prof-error"></div>
        <div style="color:#22c55e;font-size:0.82rem;margin-top:0.5rem;display:none" id="prof-success">Details updated!</div>
        <button class="btn-primary" id="btn-save-profile" style="margin-top:0.75rem">Save Changes</button>
      </div>
    </div>
  </div>

</div>

<script>
const TOKEN_KEY = 'ndj_staff_token';
const USER_KEY  = 'ndj_staff_user';

function getToken() { return localStorage.getItem(TOKEN_KEY); }
function getUser()  { try { return JSON.parse(localStorage.getItem(USER_KEY) || '{}'); } catch { return {}; } }
function saveSession(d) {
  localStorage.setItem(TOKEN_KEY, d.token);
  localStorage.setItem(USER_KEY, JSON.stringify({ name: d.name, email: d.email }));
}
function clearSession() { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(USER_KEY); }
function authHeaders() { return { 'Authorization': 'Bearer ' + getToken() }; }

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtDate(d) {
  if (!d) return null;
  try {
    const dt = new Date(d + (d.includes('T') ? '' : 'T00:00:00'));
    return { day: dt.getDate(), month: dt.toLocaleString('en-GB',{month:'short'}), full: dt.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) };
  } catch { return null; }
}

function isPast(dateStr) {
  if (!dateStr) return false;
  try {
    const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
    return d < new Date(new Date().toDateString());
  } catch { return false; }
}

function bookingCard(b) {
  const dt = fmtDate(b.event_date);
  return `
    <div class="booking-card">
      ${dt ? `<div class="booking-date-box"><div class="date-day">${dt.day}</div><div class="date-month">${dt.month}</div></div>` : ''}
      <div class="booking-info">
        <div class="booking-title">${esc(b.title || b.event_type || 'Booking')} <span class="status-badge status-${esc(b.status)}">${esc(b.status)}</span></div>
        <div class="booking-meta">
          ${dt ? `<span>${dt.full}</span>` : ''}
          ${b.location ? `<span>📍 ${esc(b.location)}</span>` : ''}
          ${b.customer_name ? `<span>👤 ${esc(b.customer_name)}</span>` : ''}
          ${b.total_price ? `<span>💰 £${parseFloat(b.total_price).toFixed(0)}</span>` : ''}
        </div>
        ${b.notes ? `<div class="booking-notes">${esc(b.notes)}</div>` : ''}
      </div>
    </div>`;
}

document.getElementById('btn-login').addEventListener('click', async () => {
  const btn = document.getElementById('btn-login');
  const errEl = document.getElementById('login-error');
  errEl.classList.remove('visible');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const r = await fetch('/api/auth/staff/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email: document.getElementById('login-email').value.trim(), password: document.getElementById('login-pw').value }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Login failed');
    saveSession(d);
    showDashboard();
  } catch(e) {
    errEl.textContent = e.message; errEl.classList.add('visible');
  } finally { btn.disabled = false; btn.textContent = 'Sign In'; }
});

document.getElementById('login-pw').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-login').click(); });

document.getElementById('btn-logout').addEventListener('click', () => {
  clearSession();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('auth-section').style.display = '';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('staff-label').style.display = 'none';
});

async function showDashboard() {
  const user = getUser();
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('dashboard').style.display = '';
  document.getElementById('btn-logout').style.display = '';
  document.getElementById('staff-label').style.display = '';
  document.getElementById('staff-label').textContent = user.name;
  document.getElementById('staff-name-heading').textContent = user.name + "'s Schedule";

  document.getElementById('profile-section').style.display = '';
  document.getElementById('prof-name').value  = user.name  || '';
  document.getElementById('prof-email').value = user.email || '';

  const r = await fetch('/api/staff/bookings', { headers: authHeaders() });
  if (r.status === 401) { clearSession(); location.reload(); return; }
  const bookings = await r.json();

  document.getElementById('bookings-loading').style.display = 'none';

  const upcoming = bookings.filter(b => !isPast(b.event_date) && b.status !== 'cancelled');
  const past     = bookings.filter(b => isPast(b.event_date) || b.status === 'cancelled');

  if (!bookings.length) {
    document.getElementById('empty-state').style.display = '';
    return;
  }

  if (upcoming.length) {
    document.getElementById('upcoming-section').style.display = '';
    document.getElementById('upcoming-list').innerHTML = upcoming.map(bookingCard).join('');
  }
  if (past.length) {
    document.getElementById('past-section').style.display = '';
    document.getElementById('past-list').innerHTML = past.map(bookingCard).join('');
  }
  if (upcoming.length && past.length) {
    document.getElementById('divider').style.display = '';
  }
}

document.getElementById('btn-save-profile').addEventListener('click', async () => {
  const btn = document.getElementById('btn-save-profile');
  const errEl = document.getElementById('prof-error');
  const okEl  = document.getElementById('prof-success');
  errEl.classList.remove('visible'); okEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const r = await fetch('/api/staff/profile', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
      body: JSON.stringify({
        name:     document.getElementById('prof-name').value.trim(),
        email:    document.getElementById('prof-email').value.trim(),
        password: document.getElementById('prof-pw').value,
      }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Failed');
    saveSession(d);
    document.getElementById('staff-name-heading').textContent = d.name + "'s Schedule";
    document.getElementById('staff-label').textContent = d.name;
    okEl.style.display = 'block';
    document.getElementById('prof-pw').value = '';
  } catch(e) { errEl.textContent = e.message; errEl.classList.add('visible'); }
  finally { btn.disabled = false; btn.textContent = 'Save Changes'; }
});

if (getToken()) showDashboard();
</script>
</body>
</html>
