<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ branding.company_name }} — My Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  {{ branding_style | safe }}
  <style>
    /* ── Header right side ── */
    .header-nav { display: flex; gap: 1rem; align-items: center; }
    .header-nav a {
      color: var(--text-secondary); text-decoration: none;
      font-size: 0.85rem; transition: color var(--transition);
    }
    .header-nav a:hover { color: var(--text-primary); }
    #btn-logout-header {
      background: none; border: 1px solid var(--border-hover);
      color: var(--text-secondary); padding: 0.4rem 0.9rem;
      border-radius: var(--radius-sm); cursor: pointer; font-size: 0.82rem;
      display: none; font-family: inherit;
      transition: border-color var(--transition), color var(--transition);
    }
    #btn-logout-header:hover { border-color: var(--accent); color: var(--text-primary); }

    /* ── Page ── */
    .page { max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    /* ── Form inputs ── */
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-size: 0.82rem; font-weight: 500;
      color: var(--text-secondary); margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%; background: var(--bg-input);
      border: 1px solid var(--border-hover);
      border-radius: var(--radius-sm);
      padding: 0.65rem 0.9rem; color: var(--text-primary);
      font-size: 0.9rem; outline: none; font-family: inherit;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .btn-primary {
      width: 100%; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm);
      padding: 0.75rem; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; margin-top: 0.5rem; font-family: inherit;
      transition: opacity var(--transition);
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-error {
      color: var(--danger); font-size: 0.82rem; margin-top: 0.6rem;
      display: none; background: rgba(239,68,68,0.08);
      border-radius: var(--radius-sm); padding: 0.5rem 0.75rem;
    }
    .auth-error.visible { display: block; }

    /* ── Auth card ── */
    .auth-card {
      background: var(--bg-card); border: 1px solid var(--border-hover);
      border-radius: var(--radius-xl); padding: 2.5rem;
      max-width: 420px; margin: 3rem auto;
      box-shadow: var(--shadow-card);
    }
    .auth-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.3rem; }
    .auth-sub { color: var(--text-secondary); font-size: 0.88rem; margin-bottom: 1.8rem; }
    .auth-tabs {
      display: flex; margin-bottom: 1.8rem;
      background: var(--bg-surface); border-radius: var(--radius-sm);
      padding: 3px; gap: 3px;
    }
    .auth-tab {
      flex: 1; padding: 0.5rem; background: none; border: none;
      color: var(--text-muted); cursor: pointer; font-size: 0.875rem;
      font-weight: 500; border-radius: calc(var(--radius-sm) - 2px);
      transition: background var(--transition), color var(--transition);
      font-family: inherit;
    }
    .auth-tab.active {
      background: var(--accent); color: #fff;
    }

    /* ── Dashboard ── */
    #dashboard { display: none; }
    .welcome-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
    }
    .welcome-bar h1 { font-size: 1.5rem; font-weight: 700; }
    .welcome-bar p { color: var(--text-secondary); font-size: 0.875rem; margin-top: 0.2rem; }
    .btn-new-quote {
      background: var(--accent); color: #fff; text-decoration: none;
      padding: 0.6rem 1.2rem; border-radius: var(--radius-sm);
      font-size: 0.875rem; font-weight: 600;
      transition: opacity var(--transition);
    }
    .btn-new-quote:hover { opacity: 0.88; }

    /* ── Portal tabs ── */
    .portal-tabs {
      display: flex; gap: 0.25rem; margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-hover); padding-bottom: 0;
    }
    .portal-tab {
      background: none; border: none; color: var(--text-muted);
      padding: 0.65rem 1.1rem; cursor: pointer; font-size: 0.875rem;
      font-weight: 500; border-bottom: 2px solid transparent;
      margin-bottom: -1px; font-family: inherit;
      transition: color var(--transition), border-color var(--transition);
    }
    .portal-tab:hover { color: var(--text-secondary); }
    .portal-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .pane { display: none; }
    .pane.active { display: block; }

    /* ── Cards ── */
    .booking-card, .enquiry-card {
      background: var(--bg-card); border: 1px solid var(--border-hover);
      border-radius: var(--radius-lg); padding: 1.2rem 1.4rem;
      margin-bottom: 0.75rem;
      transition: border-color var(--transition);
    }
    .booking-card:hover, .enquiry-card:hover { border-color: var(--border-active); }
    .card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    }
    .card-title { font-weight: 600; font-size: 1rem; margin-bottom: 0.2rem; }
    .card-meta { color: var(--text-muted); font-size: 0.82rem; }
    .status-badge {
      font-size: 0.72rem; font-weight: 600; padding: 0.2rem 0.65rem;
      border-radius: 20px; text-transform: uppercase;
      letter-spacing: 0.04em; white-space: nowrap;
    }
    .status-confirmed { background: rgba(16,185,129,0.15); color: var(--success); }
    .status-completed { background: var(--accent-dim); color: var(--accent); }
    .status-cancelled { background: rgba(239,68,68,0.12); color: var(--danger); }
    .status-new       { background: rgba(255,255,255,0.06); color: var(--text-muted); }
    .status-contacted { background: rgba(245,158,11,0.15); color: var(--warning); }
    .status-booked    { background: rgba(16,185,129,0.15); color: var(--success); }
    .status-declined  { background: rgba(239,68,68,0.12); color: var(--danger); }
    .card-detail {
      display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 0.7rem;
    }
    .card-detail span { font-size: 0.82rem; color: var(--text-muted); }
    .card-detail strong { color: var(--text-primary); font-weight: 500; }
    .card-price { font-size: 1rem; font-weight: 700; color: var(--accent); margin-top: 0.5rem; }
    .empty-state {
      text-align: center; padding: 3rem 1rem; color: var(--text-muted);
    }
    .empty-state strong { color: var(--text-secondary); }
    .empty-state p { margin-top: 0.5rem; font-size: 0.875rem; }
    .loading { text-align: center; padding: 2rem; color: var(--text-muted); }

    .brand-logo-img { height: 28px; width: auto; object-fit: contain; display: block; }

    @media (max-width: 768px) {
      .page { padding: 1.5rem 1rem; }
      .auth-card { padding: 1.75rem 1.25rem; margin: 1.5rem auto; }
      .form-group input { font-size: 16px; }
      .welcome-bar h1 { font-size: 1.25rem; }
      .portal-tab { padding: 0.55rem 0.85rem; font-size: 0.82rem; }
      .booking-card, .enquiry-card { padding: 1rem; }
      .card-detail { gap: 0.75rem; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="/" class="logo">
    {% if branding.logo_image %}<div class="logo-icon logo-icon--img"><img src="{{ branding.logo_image }}" class="brand-logo-img" alt="{{ branding.company_name }}" /></div>{% else %}<div class="logo-icon">{{ branding.logo_emoji }}</div>{% endif %}
    <span class="logo-text">{{ branding.company_name }}</span>
  </a>
  <div class="header-nav">
    <a href="/">Quote Builder</a>
    <button id="btn-logout-header">Sign out</button>
  </div>
</header>

<div class="page">

  <!-- Auth -->
  <div id="auth-section">
    <div class="auth-card">
      <div class="auth-title">My Account</div>
      <div class="auth-sub">Sign in to view your bookings and enquiries</div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">Sign In</button>
        <button class="auth-tab" id="tab-signup">Create Account</button>
      </div>

      <!-- Login form -->
      <div id="form-login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div class="auth-error" id="login-error"></div>
        <button class="btn-primary" id="btn-login">Sign In</button>
      </div>

      <!-- Signup form -->
      <div id="form-signup" style="display:none">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" placeholder="Your name" autocomplete="name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password <span style="color:var(--text-muted);font-weight:400">(min 6 chars)</span></label>
          <input type="password" id="signup-pw" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <div class="auth-error" id="signup-error"></div>
        <button class="btn-primary" id="btn-signup">Create Account</button>
      </div>
    </div>
  </div>

  <!-- Dashboard (shown after login) -->
  <div id="dashboard">
    <div class="welcome-bar">
      <div>
        <h1 id="welcome-name">Welcome back</h1>
        <p id="welcome-email"></p>
      </div>
      <a href="/" class="btn-new-quote">+ New Enquiry</a>
    </div>

    <div class="portal-tabs">
      <button class="portal-tab active" data-pane="bookings">Bookings</button>
      <button class="portal-tab" data-pane="enquiries">Enquiries</button>
      <button class="portal-tab" data-pane="account">Account</button>
    </div>

    <div id="pane-bookings" class="pane active">
      <div class="loading" id="bookings-loading">Loading…</div>
      <div id="bookings-list"></div>
    </div>

    <div id="pane-enquiries" class="pane">
      <div class="loading" id="enquiries-loading">Loading…</div>
      <div id="enquiries-list"></div>
    </div>

    <div id="pane-account" class="pane">
      <div class="booking-card" style="max-width:460px">
        <div class="card-title" style="margin-bottom:1.2rem">Update Your Details</div>
        <div class="form-group"><label>Full Name</label><input type="text" id="acc-name" /></div>
        <div class="form-group"><label>Email</label><input type="email" id="acc-email" /></div>
        <div class="form-group"><label>New Password <span style="color:var(--text-muted);font-weight:400">(leave blank to keep current)</span></label><input type="password" id="acc-pw" placeholder="••••••••" /></div>
        <div class="auth-error" id="acc-error"></div>
        <div style="color:var(--success);font-size:0.82rem;margin-top:0.5rem;display:none" id="acc-success">Details updated!</div>
        <button class="btn-primary" id="btn-save-account" style="margin-top:0.75rem">Save Changes</button>
      </div>
    </div>
  </div>

</div>

<script>
const TOKEN_KEY = 'ndj_customer_token';
const USER_KEY  = 'ndj_customer_user';

function getToken() { return localStorage.getItem(TOKEN_KEY); }
function getUser()  { try { return JSON.parse(localStorage.getItem(USER_KEY) || '{}'); } catch { return {}; } }

function saveSession(data) {
  localStorage.setItem(TOKEN_KEY, data.token);
  localStorage.setItem(USER_KEY, JSON.stringify({ name: data.name, email: data.email }));
}

function clearSession() {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(USER_KEY);
}

function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() };
}

async function apiPost(url, body) {
  const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  const d = await r.json();
  if (!r.ok) throw new Error(d.detail || 'Error');
  return d;
}

async function apiGet(url) {
  const r = await fetch(url, { headers: authHeaders() });
  if (r.status === 401) { logout(); return []; }
  return r.json();
}

function statusBadge(s) {
  return '<span class="status-badge status-' + s + '">' + s + '</span>';
}

function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
  catch { return d; }
}

function fmt(n) { return n ? '£' + parseFloat(n).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',') : '—'; }

/* ── Tab switching ── */
document.querySelectorAll('.portal-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.portal-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('pane-' + btn.dataset.pane).classList.add('active');
  });
});

/* ── Auth tab switching ── */
document.getElementById('tab-login').addEventListener('click', () => {
  document.getElementById('tab-login').classList.add('active');
  document.getElementById('tab-signup').classList.remove('active');
  document.getElementById('form-login').style.display = '';
  document.getElementById('form-signup').style.display = 'none';
});
document.getElementById('tab-signup').addEventListener('click', () => {
  document.getElementById('tab-signup').classList.add('active');
  document.getElementById('tab-login').classList.remove('active');
  document.getElementById('form-signup').style.display = '';
  document.getElementById('form-login').style.display = 'none';
});

/* ── Login ── */
document.getElementById('btn-login').addEventListener('click', async () => {
  const btn = document.getElementById('btn-login');
  const errEl = document.getElementById('login-error');
  errEl.classList.remove('visible');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const data = await apiPost('/api/auth/customer/login', {
      email: document.getElementById('login-email').value.trim(),
      password: document.getElementById('login-pw').value,
    });
    saveSession(data);
    showDashboard();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('visible');
  } finally { btn.disabled = false; btn.textContent = 'Sign In'; }
});

/* ── Sign up ── */
document.getElementById('btn-signup').addEventListener('click', async () => {
  const btn = document.getElementById('btn-signup');
  const errEl = document.getElementById('signup-error');
  errEl.classList.remove('visible');
  btn.disabled = true; btn.textContent = 'Creating account…';
  try {
    const data = await apiPost('/api/auth/customer/register', {
      name:     document.getElementById('signup-name').value.trim(),
      email:    document.getElementById('signup-email').value.trim(),
      password: document.getElementById('signup-pw').value,
    });
    saveSession(data);
    showDashboard();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('visible');
  } finally { btn.disabled = false; btn.textContent = 'Create Account'; }
});

/* ── Logout ── */
function logout() {
  clearSession();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('auth-section').style.display = '';
  document.getElementById('btn-logout-header').style.display = 'none';
}
document.getElementById('btn-logout-header').addEventListener('click', logout);

/* ── Dashboard ── */
async function showDashboard() {
  const user = getUser();
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('dashboard').style.display = '';
  document.getElementById('btn-logout-header').style.display = '';
  document.getElementById('welcome-name').textContent = 'Welcome, ' + user.name;
  document.getElementById('welcome-email').textContent = user.email;
  document.getElementById('acc-name').value  = user.name  || '';
  document.getElementById('acc-email').value = user.email || '';
  loadBookings();
  loadEnquiries();
}

async function loadBookings() {
  const list = document.getElementById('bookings-list');
  document.getElementById('bookings-loading').style.display = '';
  list.innerHTML = '';
  const bookings = await apiGet('/api/customer/bookings');
  document.getElementById('bookings-loading').style.display = 'none';
  if (!bookings.length) {
    list.innerHTML = '<div class="empty-state"><strong>No confirmed bookings yet</strong><p>Once your enquiry is confirmed by us, it will appear here.</p></div>';
    return;
  }
  bookings.forEach(b => {
    list.innerHTML += `
      <div class="booking-card">
        <div class="card-top">
          <div>
            <div class="card-title">${esc(b.title || b.event_type || 'Booking')}</div>
            <div class="card-meta">Booking #${b.id}</div>
          </div>
          ${statusBadge(b.status)}
        </div>
        <div class="card-detail">
          <span><strong>Date</strong> ${fmtDate(b.event_date)}</span>
          <span><strong>Venue</strong> ${esc(b.location || '—')}</span>
          ${b.staff_name ? '<span><strong>Your DJ</strong> ' + esc(b.staff_name) + '</span>' : ''}
        </div>
        ${b.total_price ? '<div class="card-price">' + fmt(b.total_price) + '</div>' : ''}
        ${b.notes ? '<div class="card-meta" style="margin-top:0.5rem">' + esc(b.notes) + '</div>' : ''}
      </div>`;
  });
}

async function loadEnquiries() {
  const list = document.getElementById('enquiries-list');
  document.getElementById('enquiries-loading').style.display = '';
  list.innerHTML = '';
  const quotes = await apiGet('/api/customer/quotes');
  document.getElementById('enquiries-loading').style.display = 'none';
  if (!quotes.length) {
    list.innerHTML = '<div class="empty-state"><strong>No enquiries yet</strong><p><a href="/" style="color:var(--accent)">Build your package</a> to submit your first enquiry.</p></div>';
    return;
  }
  quotes.forEach(q => {
    list.innerHTML += `
      <div class="enquiry-card">
        <div class="card-top">
          <div>
            <div class="card-title">${esc(q.event_type || 'Enquiry')} — ${fmtDate(q.event_date)}</div>
            <div class="card-meta">Enquiry #${q.id} · Submitted ${fmtDate(q.created_at)}</div>
          </div>
          ${statusBadge(q.status)}
        </div>
        <div class="card-detail">
          <span><strong>Venue</strong> ${esc(q.location || '—')}</span>
          <span><strong>Total</strong> ${fmt(q.total_price)}</span>
        </div>
      </div>`;
  });
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Account / profile ── */
document.getElementById('btn-save-account').addEventListener('click', async () => {
  const btn = document.getElementById('btn-save-account');
  const errEl = document.getElementById('acc-error');
  const okEl  = document.getElementById('acc-success');
  errEl.classList.remove('visible'); okEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const r = await fetch('/api/customer/profile', {
      method: 'PATCH', headers: authHeaders(),
      body: JSON.stringify({
        name:     document.getElementById('acc-name').value.trim(),
        email:    document.getElementById('acc-email').value.trim(),
        password: document.getElementById('acc-pw').value,
      }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Failed');
    saveSession(d);
    document.getElementById('welcome-name').textContent = 'Welcome, ' + d.name;
    document.getElementById('welcome-email').textContent = d.email;
    okEl.style.display = 'block';
    document.getElementById('acc-pw').value = '';
  } catch(e) { errEl.textContent = e.message; errEl.classList.add('visible'); }
  finally { btn.disabled = false; btn.textContent = 'Save Changes'; }
});

/* ── Init ── */
if (getToken()) {
  showDashboard();
}
</script>
</body>
</html>
