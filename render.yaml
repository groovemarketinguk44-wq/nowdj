services:
  - type: web
    name: nowdj
    runtime: python
    buildCommand: apt-get install -y libpango-1.0-0 libcairo2 libgdk-pixbuf2.0-0 shared-mime-info && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nowdj-db
          property: connectionString
      - key: BASE_DOMAIN
        value: nowdj.onrender.com

databases:
  - name: nowdj-db
    plan: free
