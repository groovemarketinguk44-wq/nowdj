services:
  - type: web
    name: nowdj
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_DIR
        value: /data
    disk:
      name: nowdj-data
      mountPath: /data
      sizeGB: 1
